# A more detailed description of the manifest format `Bender.yml` can be found here:
# https://github.com/pulp-platform/bender#manifest-format-benderyml

package:
  name: 5g-nr-ldpc-encoder
  authors:
    - "Nur Dawam Abdan S."
    - "Randy Revaldo"
    - "Avila Khadhibyan <khavl2103@gmail.com>"

dependencies:
  axi: { git: "https://github.com/pulp-platform/axi.git", version: "0.39" }
  common_cells: {git: "https://github.com/pulp-platform/common_cells.git", version: "1.39.0"}

sources:
  - defines:
      SYNTHESIS: ~
    files:
      # Source files grouped in levels. Files in level 0 have no dependencies on files in this
      # package. Files in level 1 only depend on files in level 0, files in level 2 on files in
      # levels 1 and 0, etc. Files within a level are ordered alphabetically.
      # Level 0
      - "rtl/barrel_shifter.sv"
      - "rtl/gf2_sum.sv"
      - "rtl/ldpc_pkg.sv"
      - "rtl/lutram.sv"
      - "rtl/lutrom.sv"
      - "rtl/rom_dp.sv"
      - "rtl/zc_decoder.sv"
    
      # Level 1
      - "rtl/codeword_generator.sv"
      - "rtl/core_parity_bit_calculator.sv"
      - "rtl/csr_decoder.sv"
      - "rtl/direct_bit_permutation.sv"
      - "rtl/group_reordering.sv"
      - "rtl/input_buffer.sv"
      - "rtl/merge_sel_lambda.sv"
      - "rtl/output_buffer.sv"
      - "rtl/parameter_calculation.sv"
      - "rtl/pc_rearrange.sv"
    
      # Level 2
      - "rtl/top_level_shifter.sv"
    
      # Level 3
      - "rtl/ldpc_encoder_core.sv"
    
      # Level 4
      - "rtl/ldpc_encoder.sv"

      # Level 5
      - "rtl/ldpc_encoder_wrapper.v"